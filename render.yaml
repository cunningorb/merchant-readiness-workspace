services:
  - type: web
    name: merchant-readiness-workspace
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: "Merchant Readiness Workspace"
      - key: APP_ENV
        value: "production"
      - key: APP_DEBUG
        value: "false"
      - key: LOG_CHANNEL
        value: "stderr"
      - key: DB_CONNECTION
        value: "pgsql"
      - key: DATABASE_URL
        sync: false
      - key: SESSION_DRIVER
        value: "database"
      - key: CACHE_STORE
        value: "database"
      - key: QUEUE_CONNECTION
        value: "database"
      - key: APP_KEY
        sync: false
      - key: APP_URL
        sync: false
