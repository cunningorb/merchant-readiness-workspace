  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- form card -->\n  <div style=\"flex:1;display:flex;justify-content:center;padding:52px 32px 120px;\">\n    <div style=\"width:100%;max-width:640px;\">\n      <div style=\"font-size:12px;font-family:'Geist Mono';letter-spacing:0.08em;text-transform:uppercase;color:#a1a1aa;margin-bottom:12px;\">Section {{ curNum }}<\u002Fdiv>\n      <h1 style=\"font-size:32px;line-height:1.15;letter-spacing:-0.02em;font-weight:700;margin:0 0 8px;\">{{ curStep.q }}<\u002Fh1>\n      <p style=\"font-size:15px;color:#71717a;margin:0 0 34px;\">{{ curStep.hint }}<\u002Fp>\n\n      <div style=\"display:flex;flex-direction:column;gap:20px;\">\n        <sc-for list=\"{{ curFields }}\" as=\"f\" hint-placeholder-count=\"5\">\n          <div>\n            <label style=\"display:block;font-size:13px;font-weight:550;color:#3f3f46;margin-bottom:8px;\">{{ f.label }}<\u002Flabel>\n            <sc-if value=\"{{ f.isToggle }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;gap:8px;\">\n                <div style=\"{{ f.yesStyle }}\">Yes<\u002Fdiv>\n                <div style=\"{{ f.noStyle }}\">No<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n            <sc-if value=\"{{ f.isInput }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #e4e4e7;border-radius:9px;padding:12px 14px;box-shadow:0 1px 2px rgba(16,24,40,0.03);\">\n                <span style=\"font-size:14.5px;color:#18181b;\">{{ f.value }}<\u002Fspan>\n                <sc-if value=\"{{ f.isSelect }}\" hint-placeholder-val=\"{{ false }}\"><i data-lucide=\"chevron-down\" style=\"width:16px;height:16px;color:#a1a1aa\"><\u002Fi><\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-top:40px;padding-top:24px;border-top:1px solid #f0f0f1;\">\n        <button onclick=\"{{ prev }}\" style=\"{{ prevBtnStyle }}\"><i data-lucide=\"arrow-left\" style=\"width:16px;height:16px\"><\u002Fi>Previous<\u002Fbutton>\n        <div style=\"display:flex;align-items:center;gap:12px;\">\n          <button style=\"font-size:13.5px;color:#a1a1aa;background:none;border:none;cursor:pointer;\">Skip<\u002Fbutton>\n          <button onclick=\"{{ next }}\" style=\"display:inline-flex;align-items:center;gap:8px;font-size:14.5px;font-weight:550;color:#fff;background:#2563eb;border:none;padding:11px 20px;border-radius:9px;cursor:pointer;box-shadow:0 1px 2px rgba(37,99,235,0.3);\">{{ nextLabel }}<i data-lucide=\"arrow-right\" style=\"width:16px;height:16px\"><\u002Fi><\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n\n<!-- ============================== PUBLIC REPORT ============================== -->\n<sc-if value=\"{{ isReport }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"min-height:100vh;background:#f1f1f2;padding:36px 20px 130px;\">\n  <!-- toolbar -->\n  <div style=\"max-width:816px;margin:0 auto 20px;display:flex;align-items:center;justify-content:space-between;\">\n    <div style=\"display:flex;align-items:center;gap:9px;color:#71717a;font-size:13px;\"><i data-lucide=\"file-text\" style=\"width:15px;height:15px\"><\u002Fi>readiness-report-north-ridge.pdf<\u002Fdiv>\n    <div style=\"display:flex;gap:9px;\">\n      <button style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:#52525b;background:#fff;border:1px solid #e4e4e7;padding:8px 13px;border-radius:8px;cursor:pointer;\"><i data-lucide=\"printer\" style=\"width:14px;height:14px\"><\u002Fi>Print<\u002Fbutton>\n      <button style=\"display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:550;color:#fff;background:#18181b;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;\"><i data-lucide=\"download\" style=\"width:14px;height:14px\"><\u002Fi>Download<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- paper -->\n  <div style=\"max-width:816px;margin:0 auto;background:#fff;box-shadow:0 4px 24px rgba(16,24,40,0.10),0 1px 3px rgba(16,24,40,0.06);border-radius:3px;padding:64px 68px;\">\n    <!-- letterhead -->\n    <div style=\"display:flex;align-items:flex-start;justify-content:space-between;padding-bottom:26px;border-bottom:2px solid #18181b;\">\n      <div style=\"display:flex;align-items:center;gap:11px;\">\n        <div style=\"width:34px;height:34px;border-radius:9px;background:#2563eb;display:flex;align-items:center;justify-content:center;\"><i data-lucide=\"rotate-ccw\" style=\"width:19px;height:19px;color:#fff\"><\u002Fi><\u002Fdiv>\n        <div><div style=\"font-size:17px;font-weight:700;letter-spacing:-0.01em;\">Cadence<\u002Fdiv><div style=\"font-size:12px;color:#a1a1aa;\">Returns Automation<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:right;\">\n        <div style=\"font-size:11px;font-family:'Geist Mono';letter-spacing:0.08em;text-transform:uppercase;color:#a1a1aa;\">Confidential<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#71717a;margin-top:3px;\">Prepared July 8, 2026<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- title -->\n    <div style=\"padding:34px 0 30px;\">\n      <div style=\"font-size:12px;font-family:'Geist Mono';letter-spacing:0.08em;text-transform:uppercase;color:#2563eb;margin-bottom:12px;\">Merchant Readiness Report<\u002Fdiv>\n      <h1 style=\"font-size:34px;font-weight:700;letter-spacing:-0.025em;margin:0 0 8px;line-height:1.1;\">North Ridge Outfitters<\u002Fh1>\n      <div style=\"font-size:14px;color:#71717a;\">Outdoor Apparel · Shopify · 48,000 annual orders · United States &amp; Canada<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- score + summary -->\n    <div style=\"display:grid;grid-template-columns:190px 1fr;gap:36px;padding:28px 0;border-top:1px solid #f0f0f1;border-bottom:1px solid #f0f0f1;align-items:center;\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;\">\n        <div style=\"position:relative;width:150px;height:150px;\">\n          <svg width=\"150\" height=\"150\" viewBox=\"0 0 150 150\" style=\"transform:rotate(-90deg)\">\n            <circle cx=\"75\" cy=\"75\" r=\"64\" fill=\"none\" stroke=\"#f0f0f1\" stroke-width=\"12\"><\u002Fcircle>\n            <circle cx=\"75\" cy=\"75\" r=\"64\" fill=\"none\" stroke=\"{{ overall.color }}\" stroke-width=\"12\" stroke-linecap=\"round\" stroke-dasharray=\"{{ ringRepC }}\" stroke-dashoffset=\"{{ ringRepOffset }}\"><\u002Fcircle>\n          <\u002Fsvg>\n          <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;\"><span style=\"font-size:46px;font-weight:700;letter-spacing:-0.03em;line-height:1;\">68<\u002Fspan><span style=\"font-size:11px;color:#a1a1aa;font-family:'Geist Mono';\">/ 100<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:14px;font-weight:600;color:#2563eb;\">Developing<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:11px;font-family:'Geist Mono';letter-spacing:0.08em;text-transform:uppercase;color:#a1a1aa;margin-bottom:10px;\">Executive summary<\u002Fdiv>\n        <p style=\"font-size:14.5px;line-height:1.65;color:#3f3f46;margin:0;text-wrap:pretty;\">{{ execSummary }}<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- category breakdown -->\n    <div style=\"padding:30px 0 8px;\">\n      <h2 style=\"font-size:15px;font-weight:700;letter-spacing:-0.01em;margin:0 0 20px;\">Category breakdown<\u002Fh2>\n      <div style=\"display:flex;flex-direction:column;gap:15px;\">\n        <sc-for list=\"{{ categories }}\" as=\"c\" hint-placeholder-count=\"5\">\n          <div style=\"display:grid;grid-template-columns:190px 1fr 40px;gap:18px;align-items:center;\">\n            <span style=\"font-size:13.5px;font-weight:550;color:#27272a;\">{{ c.label }}<\u002Fspan>\n            <div style=\"height:8px;background:#f4f4f5;border-radius:999px;overflow:hidden;\"><div style=\"{{ c.barStyle }}\"><\u002Fdiv><\u002Fdiv>\n            <span style=\"font-family:'Geist Mono';font-size:14px;font-weight:600;text-align:right;color:{{ c.color }}\">{{ c.score }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- opportunities -->\n    <div style=\"padding:30px 0 8px;\">\n      <h2 style=\"font-size:15px;font-weight:700;letter-spacing:-0.01em;margin:0 0 6px;\">Top opportunities<\u002Fh2>\n      <p style=\"font-size:13px;color:#a1a1aa;margin:0 0 18px;\">Ranked by expected business impact.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:2px;\">\n        <sc-for list=\"{{ opportunities }}\" as=\"o\" hint-placeholder-count=\"4\">\n          <div style=\"display:grid;grid-template-columns:24px 1fr auto;gap:14px;padding:15px 0;border-bottom:1px solid #f4f4f5;align-items:baseline;\">\n            <span style=\"font-family:'Geist Mono';font-size:13px;color:#c4c4c8;\">{{ o.rank }}<\u002Fspan>\n            <div><div style=\"display:flex;align-items:center;gap:10px;margin-bottom:5px;\"><span style=\"font-size:14.5px;font-weight:600;color:#18181b;\">{{ o.title }}<\u002Fspan><span style=\"{{ o.priStyle }}\">{{ o.priority }}<\u002Fspan><\u002Fdiv><div style=\"font-size:13px;line-height:1.5;color:#71717a;\">{{ o.desc }}<\u002Fdiv><\u002Fdiv>\n            <span style=\"font-size:13px;font-weight:600;color:#15803d;white-space:nowrap;\">{{ o.impact }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- roadmap timeline -->\n    <div style=\"padding:30px 0 8px;\">\n      <h2 style=\"font-size:15px;font-weight:700;letter-spacing:-0.01em;margin:0 0 20px;\">Recommended roadmap<\u002Fh2>\n      <div style=\"position:relative;padding-left:28px;\">\n        <div style=\"position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:#f0f0f1;\"><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:20px;\">\n          <sc-for list=\"{{ improvements }}\" as=\"i\" hint-placeholder-count=\"4\">\n            <div style=\"position:relative;\">\n              <div style=\"position:absolute;left:-28px;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid #2563eb;\"><\u002Fdiv>\n              <div style=\"font-size:14px;font-weight:550;color:#27272a;margin-bottom:5px;\">{{ i.text }}<\u002Fdiv>\n              <div style=\"display:flex;gap:16px;font-size:12px;font-family:'Geist Mono';color:#a1a1aa;\"><span>{{ i.effort }} effort<\u002Fspan><span>{{ i.time }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- footer -->\n    <div style=\"margin-top:36px;padding-top:20px;border-top:1px solid #f0f0f1;display:flex;align-items:center;justify-content:space-between;\">\n      <span style=\"font-size:11.5px;color:#a1a1aa;\">© 2026 Cadence, Inc. · Confidential — prepared for North Ridge Outfitters<\u002Fspan>\n      <span style=\"font-size:11.5px;font-family:'Geist Mono';color:#c4c4c8;\">Page 1 of 1<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;startPage&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;landing&quot;,&quot;wizard&quot;,&quot;results&quot;,&quot;workspace&quot;,&quot;report&quot;],&quot;default&quot;:&quot;landing&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Prototype&quot;},&quot;showNavigator&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Prototype&quot;}}\">\nclass Component extends DCLogic {\n  state = { page:'landing', step:0, selectedId:null, status:'All', query:'', openInfo:false };\n  constructor(props){ super(props); this.state={ ...this.state, page: props.startPage||'landing' }; }\n\n  componentDidMount(){ this._icons(); }\n  componentDidUpdate(){ this._icons(); }\n  _icons(){\n    const go=()=>{ try{ window.lucide && window.lucide.createIcons(); }catch(e){} };\n    if(window.lucide){ go(); }\n    else { let n=0; const t=setInterval(()=>{ if(window.lucide||n++>60){ clearInterval(t); go(); } },50); }\n  }\n\n  renderVals(){\n    const S=this.state;\n    const scoreColor=(s)=> s>=80?'#16a34a': s>=65?'#2563eb': s>=50?'#d97706':'#dc2626';\n    const scoreCat=(s)=> s>=80?'Strong': s>=65?'Developing': s>=50?'Emerging':'Early';\n    const R=54, C=2*Math.PI*R;\n    const ringOffset=(s)=> C*(1-s/100);\n    const bar=(s)=>({width:s+'%',height:'100%',borderRadius:'999px',background:scoreColor(s)});\n\n    // ---- nav ----\n    const pages=[['landing','Landing'],['wizard','Assessment'],['results','Results'],['workspace','Workspace'],['report','Report']];\n    const navItems=pages.map(([id,label])=>({ id, label,\n      style:{padding:'7px 13px',borderRadius:'10px',fontSize:'12.5px',fontWeight:500,cursor:'pointer',border:'none',lineHeight:1,transition:'background .15s,color .15s',background:S.page===id?'#ffffff':'transparent',color:S.page===id?'#18181b':'#d4d4d8'},\n      onClick:()=>this.setState({page:id, selectedId:null}) }));\n\n    // ---- landing ----\n    const benefits=[\n      {icon:'gauge', title:'An objective readiness score', desc:'A 0–100 benchmark across five weighted categories, calibrated against 900+ merchants like you.'},\n      {icon:'target', title:'Prioritized opportunities', desc:'The highest-impact changes for your operation — each with expected revenue and effort to ship.'},\n      {icon:'route', title:'A clear path to automate', desc:'Capability mapping shows exactly where automation moves the needle, and where it won\\u2019t yet.'},\n    ];\n    const process=[\n      {n:'01', title:'Answer six short sections', desc:'Profile, catalog, policy, exchanges, manual ops, and platform. No account required.'},\n      {n:'02', title:'Get your readiness score', desc:'An instant, shareable report with category breakdowns and peer benchmarks.'},\n      {n:'03', title:'See what to automate first', desc:'Concrete recommendations ranked by business impact and implementation effort.'},\n    ];\n    const sections=[\n      {n:'01', label:'Business Profile', icon:'building-2', time:'1 min'},\n      {n:'02', label:'Product Catalog', icon:'package', time:'1 min'},\n      {n:'03', label:'Return Policy', icon:'file-text', time:'2 min'},\n      {n:'04', label:'Exchange Process', icon:'repeat', time:'1 min'},\n      {n:'05', label:'Manual Operations', icon:'settings-2', time:'2 min'},\n      {n:'06', label:'Platform', icon:'plug', time:'1 min'},\n    ];\n\n    // ---- results (North Ridge) ----\n    const overallScore=68;\n    const overall={ score:overallScore, color:scoreColor(overallScore), cat:scoreCat(overallScore), offset:ringOffset(overallScore) };\n    const categories=[\n      {label:'Policy Design', score:62, note:'30-day blanket window with no category-specific rules.'},\n      {label:'Automation', score:55, note:'Every return is approved by hand — ~310 per week.'},\n      {label:'Exchange Readiness', score:71, note:'Exchanges are offered but never promoted before a refund.'},\n      {label:'Operational Complexity', score:74, note:'Single warehouse and a lean team keep operations simple.'},\n      {label:'Catalog Risk', score:66, note:'Missing measurements drive avoidable sizing returns.'},\n    ].map(c=>({ ...c, barStyle:bar(c.score), color:scoreColor(c.score) }));\n    const miniCats=categories.slice(0,3);\n\n    const priBase={padding:'3px 10px',borderRadius:'999px',fontSize:'11.5px',fontWeight:600,whiteSpace:'nowrap',lineHeight:1.4};\n    const priStyle=(p)=> p==='High'?{...priBase,background:'#eff6ff',color:'#1d4ed8'}: p==='Medium'?{...priBase,background:'#fffbeb',color:'#b45309'}:{...priBase,background:'#f4f4f5',color:'#52525b'};\n    const opportunities=[\n      {title:'Promote exchanges before refunds', priority:'High', impact:'+6\\u20139% retained revenue', tag:'Exchange', desc:'24% of returns are sizing-driven \\u2014 strong candidates for an exchange-first flow that keeps the sale instead of refunding it.'},\n      {title:'Add garment measurements to product pages', priority:'Medium', impact:'\\u221212% size-related returns', tag:'Catalog', desc:'Publishing measured dimensions removes guesswork on your highest-return categories and sets accurate expectations pre-purchase.'},\n      {title:'Segment return policies by category', priority:'Medium', impact:'Lower fraud & abuse', tag:'Policy', desc:'Replace one blanket policy with distinct windows and rules for outerwear, accessories, and clearance to reduce abuse.'},\n      {title:'Automate low-risk approvals', priority:'High', impact:'\\u221240% manual review load', tag:'Automation', desc:'Auto-approve returns meeting clear criteria and route only genuine exceptions to your support team.'},\n    ].map((o,i)=>({ ...o, priStyle:priStyle(o.priority), priorityLabel:o.priority+' priority', rank:String(i+1).padStart(2,'0') }));\n\n    const capBase={padding:'3px 11px',borderRadius:'999px',fontSize:'12px',fontWeight:500,whiteSpace:'nowrap',lineHeight:1.4};\n    const capStyle=(st)=> st==='Ready'?{...capBase,background:'#f0fdf4',color:'#15803d',border:'1px solid #dcfce7'}: st==='Partial'?{...capBase,background:'#fffbeb',color:'#b45309',border:'1px solid #fef3c7'}:{...capBase,background:'#fafafa',color:'#71717a',border:'1px solid #efefef'};\n    const capabilities=[\n      {name:'Self-serve returns portal', status:'Partial'},\n      {name:'Automated approval rules', status:'Gap'},\n      {name:'Exchange-first checkout', status:'Gap'},\n      {name:'Category-based policies', status:'Gap'},\n      {name:'Return-reason analytics', status:'Partial'},\n      {name:'Instant exchanges', status:'Gap'},\n      {name:'Shipping label automation', status:'Ready'},\n      {name:'Fraud & abuse controls', status:'Partial'},\n    ].map(c=>({ ...c, style:capStyle(c.status) }));\n    const improvements=[\n      {text:'Enable exchange-first workflow in the returns portal', effort:'Low', time:'1\\u20132 weeks'},\n      {text:'Import garment measurements for top 200 SKUs', effort:'Medium', time:'3\\u20134 weeks'},\n      {text:'Define auto-approval criteria and thresholds', effort:'Low', time:'1 week'},\n      {text:'Build category-specific policy rules', effort:'Medium', time:'2\\u20133 weeks'},\n    ];\n    const execSummary='North Ridge Outfitters shows developing automation maturity. Fundamentals are healthy \\u2014 a 17% return rate and lean, single-warehouse operation \\u2014 but every approval is manual and exchanges aren\\u2019t promoted. With 24% of returns driven by sizing, an exchange-first workflow and low-risk auto-approvals are high-confidence wins that recover revenue and cut review time within weeks.';\n\n    // ---- wizard ----\n    const steps=[\n      {key:'Business Profile', q:'Tell us about your business', hint:'The basics that shape everything downstream.', fields:[\n        {label:'Company name', value:'North Ridge Outfitters'},\n        {label:'Industry', value:'Outdoor Apparel', type:'select'},\n        {label:'Annual orders', value:'48,000'},\n        {label:'Average order value', value:'$92'},\n        {label:'Countries you sell to', value:'United States, Canada'},\n        {label:'Team size', value:'42 employees'},\n      ]},\n      {key:'Product Catalog', q:'How is your catalog structured?', hint:'Catalog shape predicts a lot of return behavior.', fields:[\n        {label:'Approximate SKU count', value:'~2,400'},\n        {label:'Primary category', value:'Apparel & Footwear', type:'select'},\n        {label:'Do you publish sizing / measurements?', value:'Partial \\u2014 some products', type:'select'},\n        {label:'Seasonal catalog turnover', value:'High', type:'select'},\n      ]},\n      {key:'Return Policy', q:'Describe your return policy', hint:'How strict, how consistent, how clear.', fields:[\n        {label:'Return window', value:'30 days'},\n        {label:'Category-specific rules', value:'No', type:'toggle'},\n        {label:'Restocking fees', value:'None'},\n        {label:'Final-sale exclusions', value:'Clearance only'},\n      ]},\n      {key:'Exchange Process', q:'How do exchanges work today?', hint:'Exchanges are where retained revenue lives.', fields:[\n        {label:'Exchanges offered', value:'Yes', type:'toggle', on:true},\n        {label:'Promoted before refund', value:'No', type:'toggle'},\n        {label:'Instant exchanges', value:'Not offered', type:'select'},\n        {label:'Current exchange rate', value:'24%'},\n      ]},\n      {key:'Manual Operations', q:'How much is handled manually?', hint:'This is where automation pays for itself.', fields:[\n        {label:'Return approvals', value:'Manual review', type:'select'},\n        {label:'Approvals per week', value:'~310'},\n        {label:'Support agents on returns', value:'4 agents'},\n        {label:'Policy exceptions', value:'Frequent', type:'select'},\n      ]},\n      {key:'Platform', q:'Where and how do you sell?', hint:'Determines how fast we can move.', fields:[\n        {label:'Ecommerce platform', value:'Shopify', type:'select'},\n        {label:'Warehouses', value:'1 (United States)'},\n        {label:'Existing returns tooling', value:'None'},\n        {label:'Fulfillment', value:'Self-fulfilled'},\n      ]},\n    ];\n    const stepMeta=steps.map((s,i)=>{\n      const done=i<S.step, current=i===S.step;\n      return { key:s.key, index:i, num:String(i+1).padStart(2,'0'), isDone:done, showNum:!done, dotNum:String(i+1),\n        style: current?{color:'#18181b',fontWeight:600}:{color:'#a1a1aa',fontWeight:450},\n        dotStyle:{width:'22px',height:'22px',b
